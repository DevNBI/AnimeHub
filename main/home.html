<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>
<link rel="icon" href="https://devnbi.github.io/AnimeHub/assets/media/branding/rounded-logo.png">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
border-radius:10px;
}

body{
background:#111111;
color:#ffffff;
font-family:Segoe UI,Arial,sans-serif;
min-height:100vh;
overflow-x:hidden;
display:flex;
flex-direction:column;
}

nav{
width:100%;
background:#1a1a1a;
display:flex;
justify-content:space-around;
align-items:center;
padding:14px 0;
position:fixed;
top:0;
left:0;
z-index:1000;
border-radius:0;
border-bottom:1px solid #333333;
transition:0.3s;
}

nav img{
width:26px;
height:26px;
cursor:pointer;
opacity:0.85;
transition:0.2s;
border-radius:0;
object-fit:contain;
}

nav img:hover{
opacity:1;
transform:scale(1.1);
}

main{
padding-top:80px;
width:98%;
margin:auto;
flex:1;
transition:0.3s;
}

.menu{
position:fixed;
bottom:-100%;
left:0;
width:100%;
background:#1a1a1a;
border-top:1px solid #333333;
transition:0.4s ease;
padding-bottom:30px;
z-index:999;
}

.menu.active{
bottom:0;
}

.menu-handle{
width:60px;
height:6px;
background:#444444;
margin:14px auto 20px auto;
cursor:pointer;
}

.menu-options{
display:flex;
flex-direction:column;
align-items:center;
gap:6px;
}

.menu-option{
width:100%;
display:flex;
justify-content:center;
}

.menu-option a{
width:98%;
padding:14px 16px;
text-decoration:none;
color:#ffffff;
display:block;
transition:0.2s;
}

.menu-option a:hover{
background:#2a2a2a;
}

footer{
width:100%;
background:#1a1a1a;
border-top:1px solid #333333;
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 20px;
border-radius:0;
transition:0.3s;
}

.footer-left{
font-size:14px;
opacity:0.8;
}

.footer-right{
display:flex;
gap:18px;
}

.footer-right img{
width:22px;
height:22px;
cursor:pointer;
opacity:0.85;
transition:0.2s;
border-radius:0;
object-fit:contain;
}

.footer-right img:hover{
opacity:1;
transform:scale(1.1);
}

.blur nav,
.blur main,
.blur footer{
filter:blur(6px);
}

@media(max-width:600px){
nav{
padding:12px 0;
}

nav img{
width:22px;
height:22px;
}

.menu-option a{
padding:12px 14px;
font-size:14px;
}

footer{
padding:12px 14px;
}

.footer-right img{
width:20px;
height:20px;
}
}
</style>
</head>
<body>

<nav>
<img src="https://devnbi.github.io/AnimeHub/assets/media/icons/home.png" onclick="window.location.href='https://devnbi.github.io/AnimeHub/developer/page-incomplete.html'">
<img src="https://devnbi.github.io/AnimeHub/assets/media/icons/anime.png" onclick="toggleMenu()">
<img src="https://devnbi.github.io/AnimeHub/assets/media/icons/search.png" onclick="window.location.href='https://devnbi.github.io/AnimeHub/developer/page-incomplete.html'">
<img src="https://devnbi.github.io/AnimeHub/assets/media/icons/information.png" onclick="window.location.href='https://devnbi.github.io/AnimeHub/developer/page-incomplete.html'">
</nav>

<main>
</main>

<div class="menu" id="menu">
<div class="menu-handle" onclick="toggleMenu()"></div>
<div class="menu-options">
<div class="menu-option"><a href="https://devnbi.github.io/AnimeHub/developer/page-incomplete.html">Skeleton Knight In Another World</a></div>
<div class="menu-option"><a href="https://devnbi.github.io/AnimeHub/developer/page-incomplete.html">Darling In The Franxx</a></div>
<div class="menu-option"><a href="https://devnbi.github.io/AnimeHub/developer/page-incomplete.html">Solo Leveling</a></div>
<div class="menu-option"><a href="https://devnbi.github.io/AnimeHub/developer/page-incomplete.html">Eminence In Shadow</a></div>
</div>
</div>

<footer>
<div class="footer-left">
© AnimeHub 2026. All rights reserved.
</div>
<div class="footer-right">
<img src="https://devnbi.github.io/AnimeHub/assets/media/icons/github.png" onclick="window.location.href='https://github.com/DevNBI'">
<img src="https://devnbi.github.io/AnimeHub/assets/media/icons/tiktok.png" onclick="window.location.href='https://tiktok.com/@chloe.rides.it'">
<img src="https://devnbi.github.io/AnimeHub/assets/media/icons/youtube.png" onclick="window.location.href='https://youtube.com/@init.nexusbyte'">
</div>
</footer>

<script>
function toggleMenu(){
document.getElementById('menu').classList.toggle('active');
document.body.classList.toggle('blur');
}
</script>

</body>
</html>
