<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Please Wait...</title>
<link rel="icon" href="https://devnbi.github.io/AnimeHub/assets/media/branding/rounded-logo.png">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
border-radius:10px;
}

body{
background:#111111;
color:#ffffff;
font-family:Segoe UI,Arial,sans-serif;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
text-align:center;
}

svg{
width:90px;
height:90px;
animation:spin 1.2s linear infinite;
margin-bottom:20px;
}

circle{
fill:none;
stroke:#ffffff;
stroke-width:8;
stroke-linecap:round;
stroke-dasharray:200;
stroke-dashoffset:150;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

h3{
font-size:22px;
font-weight:600;
margin-bottom:8px;
}

.subtext{
font-size:14px;
opacity:0.7;
}

.footer{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
font-size:13px;
opacity:0.6;
padding:8px 16px;
}

@media(max-width:600px){
svg{
width:70px;
height:70px;
}

h3{
font-size:18px;
}

.subtext{
font-size:12px;
}
}
</style>
</head>
<body>

<svg viewBox="0 0 100 100">
<circle cx="50" cy="50" r="35"></circle>
</svg>

<h3>AnimeHub</h3>
<div class="subtext">Please wait a moment...</div>

<div class="footer">
© AnimeHub 2026. All rights reserved.
</div>

<script>
setTimeout(function(){
window.location.href="https://devnbi.github.io/AnimeHub/main/home.html";
},3000);
</script>

</body>
</html>
